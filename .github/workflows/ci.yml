name: CI — Insurance Fraud Detection

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & Unit Tests ────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r backend/requirements.txt
          pip install ruff pytest

      - name: Lint with Ruff
        run: ruff check src/ backend/ --ignore E501

      - name: Run unit tests
        run: |
          pytest backend/tests/ -v --tb=short
        env:
          MLFLOW_TRACKING_URI: "file:///tmp/mlruns"
          MODEL_NAME: "insurance_fraud_model"

  # ── Docker Build Check ────────────────────────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t fraud-backend:${{ github.sha }} .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t fraud-frontend:${{ github.sha }} ./frontend

  # ── DVC Pipeline Check ─────────────────────────────────────────────────────
  dvc-check:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install DVC
        run: pip install dvc

      - name: Validate DVC pipeline
        run: dvc dag --md
