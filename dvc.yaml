stages:
  ingest:
    cmd: python src/data/ingest.py
    deps:
      - src/data/ingest.py
    params:
      - data.raw_path
    outs:
      - data/raw/insurance_fraud.xlsx:
          cache: false   # placed manually, not downloaded

  validate:
    cmd: python src/data/validate.py
    deps:
      - src/data/validate.py
      - data/raw/insurance_fraud.xlsx
    params:
      - data.raw_path
      - features.target_column
    outs:
      - data/processed/validation_report.json

  preprocess:
    cmd: python src/data/preprocess.py
    deps:
      - src/data/preprocess.py
      - src/features/engineer.py
      - data/raw/insurance_fraud.xlsx
      - data/processed/validation_report.json
    params:
      - data
      - features
    outs:
      - data/processed/X_train.pkl
      - data/processed/X_val.pkl
      - data/processed/X_test.pkl
      - data/processed/y_train.pkl
      - data/processed/y_val.pkl
      - data/processed/y_test.pkl
      - data/processed/preprocessor.pkl
      - data/processed/baseline_stats.json

  train:
    cmd: python src/models/train.py
    deps:
      - src/models/train.py
      - data/processed/X_train.pkl
      - data/processed/y_train.pkl
      - data/processed/X_val.pkl
      - data/processed/y_val.pkl
      - data/processed/preprocessor.pkl
    params:
      - model
      - mlflow
    outs:
      - data/processed/model.pkl
    metrics:
      - data/processed/train_metrics.json:
          cache: false

  evaluate:
    cmd: python src/models/evaluate.py
    deps:
      - src/models/evaluate.py
      - data/processed/model.pkl
      - data/processed/X_test.pkl
      - data/processed/y_test.pkl
    params:
      - model.threshold
      - mlflow
    metrics:
      - data/processed/eval_metrics.json:
          cache: false
    plots:
      - data/processed/confusion_matrix.csv:
          cache: false
          x: predicted
          y: actual
