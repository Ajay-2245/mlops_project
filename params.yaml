# ─── Data ────────────────────────────────────────────────────────────────────
data:
  # Download from: https://www.kaggle.com/datasets/arpan129/insurance-fraud-detection
  # Place the Excel file at: data/raw/insurance_fraud.xlsx
  raw_path: data/raw/insurance_fraud.xlsx
  processed_path: data/processed/
  test_size: 0.2
  val_size: 0.1
  random_state: 42

# ─── Features ────────────────────────────────────────────────────────────────
features:
  target_column: fraud_reported
  drop_columns:
    - policy_number
    - policy_bind_date
    - incident_date
    - incident_location
    - auto_model
    - insured_zip          # high-cardinality zip code, not useful for modelling
  categorical_columns:
    - policy_state
    - policy_csl
    - insured_sex
    - insured_education_level
    - insured_occupation
    - insured_hobbies
    - insured_relationship
    - incident_type
    - collision_type
    - incident_severity
    - authorities_contacted
    - incident_state
    - incident_city
    - property_damage       # NEW: YES / NO / ?
    - police_report_available
    - auto_make
  numerical_columns:
    - months_as_customer
    - age
    - policy_deductable
    - policy_annual_premium
    - umbrella_limit
    - capital-gains
    - capital-loss
    - incident_hour_of_the_day
    - number_of_vehicles_involved
    - bodily_injuries
    - witnesses
    - total_claim_amount
    - injury_claim
    - property_claim
    - vehicle_claim
    - auto_year

# ─── Model ────────────────────────────────────────────────────────────────────
model:
  algorithm: random_forest          # random_forest | xgboost | logistic_regression
  n_estimators: 500
  max_depth: 10
  min_samples_split: 5
  min_samples_leaf: 2
  class_weight: balanced
  threshold: 0.4

# ─── MLflow ──────────────────────────────────────────────────────────────────
mlflow:
  experiment_name: insurance_fraud_detection
  registered_model_name: insurance_fraud_model
  tracking_uri: http://localhost:5000
  model_alias: champion

# ─── Monitoring ──────────────────────────────────────────────────────────────
monitoring:
  drift_threshold: 0.1
  error_rate_threshold: 0.05
  latency_threshold_ms: 200
